version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: radar-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: radar_db
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: radar-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: